<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UGC Price Changer</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="app">
    <div class="header">
      <h1>UGC Price Changer</h1>
      <button id="refresh-btn" class="refresh-btn" title="Refresh prices">&#x21bb;</button>
    </div>

    <div class="add-item">
      <input type="text" id="asset-input" placeholder="Asset ID or catalog URL" spellcheck="false">
      <button id="add-btn">Add</button>
    </div>

    <div id="add-error" class="add-error hidden"></div>

    <!-- Auto-List Panel -->
    <div class="autolist-panel" id="autolist-panel">
      <div class="autolist-header" id="autolist-toggle">
        <span class="autolist-title">Auto-List</span>
        <span class="autolist-badge hidden" id="autolist-badge">ON</span>
        <span class="autolist-arrow" id="autolist-arrow">&#9660;</span>
      </div>
      <div class="autolist-body hidden" id="autolist-body">
        <div class="autolist-row">
          <label>Interval (min):</label>
          <input type="number" id="autolist-interval" min="3" max="60" value="5" class="autolist-input">
        </div>
        <div class="autolist-row">
          <label>Undercut by R$:</label>
          <input type="number" id="autolist-undercut" min="1" max="10000" value="1" class="autolist-input">
        </div>
        <div class="autolist-protected-section">
          <div class="autolist-row">
            <label>Protected:</label>
            <input type="text" id="autolist-protected-input" placeholder="User ID" class="autolist-input autolist-protected-id-input" inputmode="numeric">
            <button id="autolist-protected-add" class="autolist-protected-add-btn">Add</button>
          </div>
          <div id="autolist-protected-list" class="autolist-protected-list"></div>
        </div>
        <div class="autolist-actions">
          <button id="autolist-start" class="autolist-start-btn">Start</button>
          <button id="autolist-stop" class="autolist-stop-btn hidden">Stop</button>
        </div>
        <div class="autolist-status hidden" id="autolist-status"></div>
        <div class="autolist-log hidden" id="autolist-log"></div>
      </div>
    </div>

    <div id="loading" class="loading hidden">
      <div class="spinner"></div>
      <p>Loading items...</p>
    </div>

    <div id="error" class="error hidden">
      <p id="error-message"></p>
    </div>

    <div id="item-list" class="item-list hidden"></div>

    <div id="empty" class="empty">
      <p>No items yet. Add a UGC limited by asset ID or catalog URL above.</p>
    </div>
  </div>

  <!-- Global 2FA Modal -->
  <div id="twofa-modal" class="modal-overlay hidden">
    <div class="modal-box">
      <div class="modal-title">2FA Verification Required</div>
      <div class="modal-item-name" id="modal-item-name"></div>
      <div class="modal-desc" id="modal-desc"></div>
      <div class="modal-input-row">
        <input type="text" id="modal-2fa-input" class="modal-2fa-input" maxlength="6" placeholder="000000" inputmode="numeric" autocomplete="one-time-code">
        <button id="modal-2fa-submit" class="modal-2fa-submit">Verify</button>
      </div>
      <div id="modal-2fa-error" class="modal-2fa-error hidden"></div>
      <div class="modal-actions">
        <button id="modal-2fa-skip" class="modal-skip-btn">Skip</button>
        <span id="modal-2fa-count" class="modal-count"></span>
      </div>
    </div>
  </div>

  <!-- Confirm Dialog -->
  <div id="confirm-modal" class="modal-overlay hidden">
    <div class="modal-box confirm-box">
      <div class="confirm-msg" id="confirm-msg"></div>
      <div class="confirm-actions">
        <button id="confirm-yes" class="confirm-yes-btn">Yes</button>
        <button id="confirm-no" class="confirm-no-btn">No</button>
      </div>
    </div>
  </div>

  <!-- Success Toast -->
  <div id="success-toast" class="success-toast hidden">
    <span class="toast-icon">&#10003;</span>
    <span class="toast-msg" id="toast-msg">Listed Successfully!</span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
